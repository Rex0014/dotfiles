###################
### KEYBINDINGS ###
###################

# Comonly Used

$mod = SUPER # Primary Mod Key
$mod2 = ALT # Second

# Default Apps

$terminal = kitty
$fileManager = nautilus

# Base

bind = $mod, M, exec, ~/.config/rofi/scripts/customapp.sh
bind = $mod, Q, exec, $terminal
bind = $mod, C, killactive
bind = $mod, E, exec, $filemanager
bind = $mod, J, togglesplit, # dwindle
bind = $mod, L, exec, ~/.config/rofi/scripts/powermenu.sh
bind = $mod2, E, exec, ~/.config/rofi/scripts/tabbingmenu.sh
bind = $mod2, X, exec, pypr toggle term
bind = $mod2, C, exec, pypr toggle browser

bind = $mod2, Tab, hyprexpo:expo, enable
bind = CTRL , Tab, hyprexpo:expo, select

# Screen

bind = $mod2, S, fullscreen, 1
bind = $mod2, Q, fullscreen, 0

# Move non-floating windows

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

#Window Swap

bindm = $mod2, mouse:272, movewindow
bindm = $mod2, mouse:273, resizewindow
bind = $mod2, F, togglefloating

bind = $mod, P, exec, hyprctl dispatch swapwindow r
bind = $mod, O, exec, hyprctl dispatch swapwindow l
bind = $mod, U, exec, hyprctl dispatch swapwindow u
bind = $mod, I, exec, hyprctl dispatch swapwindow d

# Workspace Control

bind = $mod2, A, workspace, e-1
bind = $mod2, Z, workspace, e+1
bind = $mod2, mouse_down, workspace, e+1
bind = $mod2, mouse_up, workspace, e-1

# ScreenShots
bind = , Print, exec, grim - | wl-copy

# Music

bind = $mod2, right, exec, playerctl next
bind = $mod2, left, exec, playerctl previous
bind = $mod2, SPACE, exec, playerctl play-pause

# Workspaces
bind = $mod, S, movetoworkspacesilent, 1
bind = $mod, D, movetoworkspacesilent, 2
bind = $mod, F, movetoworkspacesilent, 3

bind = $mod2, W, movetoworkspacesilent, special

# debugging

bind = $mod, A, exec, hyprctl dispatch exit


bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
