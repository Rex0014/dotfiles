#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # 1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

#Gesture Configuration
#
# See https://wiki.hypr.land/Configuring/Gesture

gesture = 3, horizontal, workspace

# Per-devide Configuration
# use the command "hyprctl devices" to get the name of a device

device {
    name = instant-usb-optical-mouse
    sensitivity = -0.9
}
